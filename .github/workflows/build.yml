name: Build Empty iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Thiết lập Xcode hiển thị phiên bản
      run: |
        sudo xcode-select -s /Applications/Xcode.app
        xcodebuild -version

    - name: Tạo cấu trúc Xcode project
      run: |
        if [ ! -d "Empty.xcodeproj" ]; then
          echo "Tạo Xcode project directory..."
          mkdir -p Empty.xcodeproj/project.xcworkspace
          
          # Tạo workspace contents.xml
          cat > Empty.xcodeproj/project.xcworkspace/contents.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<Workspace version = "1.0">
   <FileRef location = "group:">
   </FileRef>
</Workspace>
EOF
        fi
        echo "Xcode project structure ready"

    - name: Biên dịch ứng dụng (Build App không cần ký chứng chỉ)
      run: |
        xcodebuild -configuration Release \
                   -sdk iphoneos \
                   CODE_SIGNING_ALLOWED=NO \
                   CODE_SIGN_IDENTITY="" \
                   PROVISIONING_PROFILE_SPECIFIER="" \
                   clean build 2>&1 || true

    - name: Đóng gói cấu trúc Payload thành file IPA hoàn chỉnh
      run: |
        mkdir -p Payload
        # Tạo bản sao thư mục app sau khi biên dịch thành công vào cấu trúc Payload
        if [ -d "build/Release-iphoneos/Empty.app" ]; then
          cp -r build/Release-iphoneos/Empty.app Payload/
        else
          # Sửa đường dẫn nếu Xcode xuất file vào thư mục mặc định khác
          cp -r ~/Library/Developer/Xcode/DerivedData/*/Build/Products/Release-iphoneos/Empty.app Payload/ 2>/dev/null || true
        fi
        zip -r Empty.ipa Payload 2>/dev/null || echo "IPA packaging skipped"

    - name: Xuất file IPA lên mục Artifacts của GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Empty-TrollStore-Edition
        path: Empty.ipa
      if: always()
